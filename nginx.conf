events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Configuração do Proxy Reverso Nginx para o Apache/PHP
    server {
        listen 80;
        server_name localhost;

        # Redireciona todas as requisições para o container Apache
        location / {
            proxy_pass http://apache:80;
            
            # Preserva o Host original com a porta (importante para o BASE_URL do PHP resolver com a porta 8050)
            proxy_set_header Host $http_host;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Limite de tamanho de upload de arquivos (útil para Notas Fiscais, etc.)
            client_max_body_size 20M;
        }

        # Tratamento de erros
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
